name: Build Anti-Ban

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV
          echo "~/theos/bin" >> $GITHUB_PATH

      - name: Setup SDK (Eng ishonchli usul)
        run: |
          # SDK-larni to'g'ridan-to'g'ri github'dan klon qilamiz (arxivsiz)
          git clone https://github.com/theos/sdks.git ~/theos/sdks

      - name: Build
        run: |
          export THEOS=~/theos
          make package FINALPACKAGE=1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AntiBan-Dylib
          path: packages/*.dylib

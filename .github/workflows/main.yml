name: Build Anti-Ban DYLIB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Theos
      run: |
        git clone --recursive --depth=1 https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV
        echo "$HOME/theos/bin" >> $GITHUB_PATH
        
    - name: Install ldid (DIRECT DOWNLOAD)
      run: |
        curl -L -o /usr/local/bin/ldid https://github.com/ProcursusTeam/ldid/releases/latest/download/ldid_linux_arm64
        chmod +x /usr/local/bin/ldid
        ldid --version  # Test
        
    - name: Install build tools
      run: |
        sudo apt update
        sudo apt install -y clang automake autoconf libtool pkg-config
        
    - name: iOS SDK
      run: |
        wget https://github.com/theos/sdks/releases/download/2024-10-01/iPhoneOS14.2.sdk.tar.xz
        mkdir -p ~/theos/sdks
        tar -xf iPhoneOS14.2.sdk.tar.xz -C ~/theos/sdks/
        
    - name: Build
      run: |
        cd ~/theos
        export ARCHS="arm64 arm64e"
        export TARGET="iphone:clang:latest:14.0"
        make package FINALPACKAGE=1
        
    - name: Upload .deb
      uses: actions/upload-artifact@v4
      with:
        name: AntiBan-deb
        path: output/*.deb

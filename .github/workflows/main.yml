name: Theos Build (Clean)

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # Theos
    - name: Setup Theos
      run: |
        git clone --depth=1 https://github.com/theos/theos.git $HOME/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV

    # SDK (clean + fix)
    - name: Install SDKs
      run: |
        rm -rf $HOME/theos/sdks
        git clone https://github.com/theos/sdks.git $HOME/theos/sdks

    # Dependencies
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y make clang perl

    # Build
    - name: Build tweak
      run: |
        export ARCHS="arm64 arm64e"
        export TARGET="iphone:clang:latest:14.0"
        make clean
        make package

    # Upload result
    - name: Upload .deb
      uses: actions/upload-artifact@v4
      with:
        name: tweak-package
        path: packages/*.deb
